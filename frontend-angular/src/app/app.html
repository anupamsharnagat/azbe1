<div class="app-container">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <h1>Rabo AI Assistant</h1>
    </div>

    <div class="upload-section">
      <div class="upload-container">
        <label for="file-upload" class="orange-btn" [class.disabled]="isProcessing()">
          {{ fileName() || 'Upload Document' }}
        </label>
        <input id="file-upload" type="file" (change)="onFileSelected($event)" [disabled]="isProcessing()">

        <div *ngIf="isProcessing()" class="spinner-wrap">
          <div class="wheel"></div>
          <span>Processing...</span>
        </div>

        <div *ngIf="isUploaded() && !isProcessing()" class="badge-indexed">
          ✓ Indexed
        </div>
      </div>
    </div>

    <div style="margin-top: auto; font-size: 10px; color: var(--text-muted);">
      Rabo Virtual Assistant in Azure
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <div class="chat-history" #chatBox>
      <div *ngFor="let msg of messages()" class="message" [ngClass]="msg.role">
        <span class="message-label">{{ msg.role === 'user' ? 'You' : 'Assistant' }}</span>
        <div class="bubble">
          {{ msg.text }}
        </div>
      </div>
    </div>

    <!-- Input Center -->
    <div class="input-area">
      <div class="input-box">
        <input [(ngModel)]="userInput" [disabled]="!isUploaded() || isProcessing()"
          placeholder="Message AI Assistant..." (keydown.enter)="send()">
        <button class="send-btn" (click)="send()" [disabled]="!userInput().trim() || !isUploaded() || isProcessing()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"
            stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="19" x2="12" y2="5" />
            <polyline points="5 12 12 5 19 12" />
          </svg>
        </button>
      </div>
    </div>
  </main>
</div>
